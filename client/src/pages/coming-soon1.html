<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon | CyManSquare</title>
  <link rel="icon" href="..\..\public\assets\images\logo.ico" type="image/x-icon">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300&display=swap');

    * {
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      margin: 0;
      background: #0f2027;
      background: linear-gradient(135deg, #203a43, #2c5364);
      font-family: 'Roboto', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      padding: 20px;
      position: relative;
    }

    .container {
      max-width: 480px;
      padding: 40px 30px;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: fadeInUp 1.2s ease forwards;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 3.8rem;
      margin: 0 0 20px 0;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #00ffe7;
      text-shadow: 0 0 10px #00ffe7;
    }

    p {
      font-weight: 300;
      font-size: 1.2rem;
      line-height: 1.6;
      margin: 0 0 30px 0;
      color: #d0f0f9;
    }

    .highlight {
      color: #00ffe7;
      font-weight: 500;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 2px;
      color: #00ffe7;
      text-shadow: 0 0 8px #00ffe7;
    }

    .countdown div {
      background: rgba(0,255,231,0.1);
      padding: 15px 25px;
      border-radius: 15px;
      min-width: 70px;
      user-select: none;
      box-shadow: inset 0 0 10px rgba(0,255,231,0.3);
      transition: transform 0.3s ease;
    }

    .countdown div:hover {
      transform: scale(1.1);
      box-shadow: inset 0 0 20px rgba(0,255,231,0.7);
    }

    .label {
      font-size: 0.85rem;
      color: #a0f0f9aa;
      margin-top: 6px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .site-name {
      margin-top: 40px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 4px;
      color: #00ffe7;
      text-shadow: 0 0 10px #00ffe7;
      user-select: none;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Animated floating particles background */
    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: #00ffe7;
      opacity: 0.15;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 6px #00ffe7);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.8rem;
        letter-spacing: 3px;
      }
      .countdown {
        font-size: 1.5rem;
        gap: 15px;
      }
      .countdown div {
        min-width: 50px;
        padding: 12px 18px;
      }
      .site-name {
        font-size: 1.1rem;
        letter-spacing: 2px;
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="particles" aria-hidden="true">
    <!-- Particles generated by JS -->
  </div>

  <div class="container" role="main" aria-label="Coming Soon Announcement">
    <h1>Coming Soon</h1>
    <p>We are building <span class="highlight">something amazing</span> for you.<br>Stay tuned and get ready to experience the <span class="highlight">future of innovation</span>.</p>

    <div class="countdown" aria-live="polite" aria-atomic="true" id="countdown">
      <div>
        <span id="days">00</span>
        <div class="label">Days</div>
      </div>
      <div>
        <span id="hours">00</span>
        <div class="label">Hours</div>
      </div>
      <div>
        <span id="minutes">00</span>
        <div class="label">Minutes</div>
      </div>
      <div>
        <span id="seconds">00</span>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div class="site-name" aria-label="Website name">
      CyMan²
    </div>
  </div>

  <script>
    // Generate particles dynamically
    const particlesContainer = document.querySelector('.particles');
    const particleCount = 25;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 12 + 6;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
      particle.style.animationDelay = (Math.random() * 15) + 's';
      particlesContainer.appendChild(particle);
    }

    // Countdown Timer
    const launchDate = new Date("2025-07-15T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance < 0) {
        document.getElementById('countdown').innerHTML = '<div style="font-size:2rem; color:#00ffe7; text-shadow: 0 0 12px #00ffe7;">We are Live!</div>';
        clearInterval(interval);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    const interval = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
