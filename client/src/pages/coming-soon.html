<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="icon" href="..\..\public\assets\images\logo.ico" type="image/x-icon">
    <style>
        /* Global styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #8dc6ff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333;
        }

        /* Main Container */
        .coming-soon-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        /* Title */
        h1 {
            font-size: 2.8rem;
            color: #343a40;
            margin-bottom: 20px;
        }

        /* Description */
        p {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 30px;
        }

        /* Back Button */
        .back-button {
            font-size: 1.3rem;
            padding: 5px 30px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        /* Subtle Animation */
        .coming-soon-container {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <div class="coming-soon-container">
        <img src="https://img.icons8.com/?size=100&id=Nmz9np2vyb4W&format=png&color=000000" alt="Coming Soon Icon">
        <h1>Feature Coming Soon</h1>
        <p>We're working hard on this feature! It will be available shortly. Thank you for your patience!</p>
        <!-- Back Button -->
        <a href="index.html" class="back-button">HOME</a>
        <a href="javascript:history.back()" class="back-button">BACK</a>

    </div>
</body>
</html>
