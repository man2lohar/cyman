<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | CyManSquare</title>
  <link rel="icon" href="../../assets/images/cymansquare_logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Akaya+Kanadaka&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* ── Tokens ── */
    :root {
      --orange:  #2d98fd;
      --orange2: #1a7edf;
      --brown:   #1c1f2e;
      --bg:      #F9F7F2;
      --card:    #ffffff;
      --input:   #f3f4f8;
      --border:  rgba(0,0,0,0.07);
      --muted:   #6b7499;
    }
    [data-dark="1"] {
      --bg:    #0f1117;
      --card:  #181b27;
      --brown: #e8eaf6;
      --input: #1e2130;
      --border:rgba(255,255,255,0.06);
      --muted: #8892b0;
    }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--brown);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background .4s, color .4s;
      overflow: hidden; position: relative;
    }

    /* ── Blobs ── */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .blob-1 { width:500px; height:380px; background:#2d98fd1e; top:-80px; left:-100px; animation:b1 14s ease-in-out infinite alternate; }
    .blob-2 { width:400px; height:320px; background:#a78bfa14; bottom:-60px; right:-80px; animation:b2 18s ease-in-out infinite alternate; }
    @keyframes b1 { from{transform:translate(0,0)}  to{transform:translate(60px,-40px)} }
    @keyframes b2 { from{transform:translate(0,0)}  to{transform:translate(-50px,50px)} }

    /* ── Card ── */
    .login-card {
      position: relative; z-index: 1;
      background: var(--card); border-radius: 24px;
      width: 90%; max-width: 420px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.09);
      animation: popIn .45s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.93) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }

    /* ── Brand ── */
    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 28px;
    }
    .brand-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(45,152,253,.35); flex-shrink: 0;
    }
    .brand-icon img { height: 22px; }
    .brand-name { font-family:'Akaya Kanadaka',cursive; font-size:1.2rem; font-weight:100; color:var(--orange); }
    .brand-sub  { font-size:.7rem; color:var(--muted); font-weight:500; margin-top:1px; }

    /* ── Headings ── */
    .form-title { font-size:1.5rem; font-weight:800; letter-spacing:-.4px; margin-bottom:4px; }
    .form-sub   { font-size:.82rem; color:var(--muted); margin-bottom:24px; }

    /* ── Message banner ── */
    .msg-banner {
      display: none; align-items: center; gap: 8px;
      padding: 10px 13px; border-radius: 10px;
      font-size:.8rem; font-weight:600; margin-bottom:16px;
    }
    .msg-banner.error   { background:rgba(255,75,75,.08); border:1px solid rgba(217,48,37,.15); color:#d93025; display:flex; }
    .msg-banner.success { background:rgba(45,152,253,.08); border:1px solid rgba(45,152,253,.15); color:var(--orange); display:flex; }

    /* ── Fields ── */
    .field { margin-bottom:14px; }
    .field label {
      display:block; font-size:.72rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.8px;
      color:var(--muted); margin-bottom:6px;
    }
    .input-row {
      display:flex; align-items:center; gap:10px;
      background:var(--input); border:1.5px solid transparent;
      border-radius:11px; padding:0 13px; transition:.2s;
    }
    .input-row:focus-within {
      border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(45,152,253,.1);
    }
    .input-row i { color:var(--muted); font-size:.9rem; flex-shrink:0; opacity:.55; }
    .input-row input {
      flex:1; padding:13px 0; background:transparent; border:none; outline:none;
      color:var(--brown); font-family:inherit; font-size:.88rem; font-weight:500;
    }
    .input-row input::placeholder { color:var(--muted); opacity:.55; }
    .eye-btn { background:none; border:none; cursor:pointer; color:var(--muted); opacity:.45; display:flex; align-items:center; padding:0; transition:.2s; }
    .eye-btn:hover { opacity:.9; }

    /* ── Forgot link ── */
    .forgot {
      display:block; text-align:right; font-size:.78rem;
      color:var(--orange); font-weight:600; cursor:pointer;
      margin:-4px 0 16px; transition:opacity .2s;
    }
    .forgot:hover { opacity:.7; }

    /* ── Primary button ── */
    .btn-primary {
      width:100%; padding:14px;
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      color:#fff; border:none; border-radius:11px;
      font-family:inherit; font-weight:800; font-size:.92rem;
      cursor:pointer; transition:.25s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(45,152,253,.35); }
    .btn-primary:disabled { opacity:.65; pointer-events:none; }
    .spinner {
      width:16px; height:16px;
      border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite; display:none;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Divider & switch ── */
    .divider { text-align:center; position:relative; margin:20px 0 14px; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
    .divider span { background:var(--card); padding:0 12px; font-size:.72rem; font-weight:600; color:var(--muted); position:relative; }
    .switch-text { font-size:.8rem; text-align:center; color:var(--muted); }
    .switch-text a { color:var(--orange); font-weight:700; cursor:pointer; }
    .switch-text a:hover { text-decoration:underline; }

    /* ── Reset section ── */
    .reset-section { display:none; }
    .back-link { display:inline-flex; align-items:center; gap:5px; font-size:.78rem; color:var(--orange); font-weight:600; cursor:pointer; margin-bottom:18px; }
    .back-link:hover { opacity:.75; }

    /* ── Dark toggle ── */
    .dark-toggle {
      position:fixed; bottom:22px; right:22px;
      width:40px; height:40px; border-radius:50%;
      background:var(--brown); color:var(--bg);
      border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 14px rgba(0,0,0,.12); transition:.3s; z-index:10;
    }
    .dark-toggle:hover { transform:scale(1.08); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">
    <!-- Brand -->
    <a class="brand" href="../../../../index.html">
      <div class="brand-icon">
        <img src="../../assets/images/cymansquare_logo.svg" alt="CyManSquare"
             onerror="this.parentElement.innerHTML='<span style=\'color:#fff;font-weight:800;font-size:.9rem\'>C²</span>'">
      </div>
      <div>
        <div class="brand-name">CyManSquare</div>
        <div class="brand-sub" id="featureLabel">Feature</div>
      </div>
    </a>

    <!-- ── Login / Register view ── -->
    <div id="loginSection">
      <h2 class="form-title" id="formTitle">Welcome back</h2>
      <p  class="form-sub"   id="formSub">Sign in to access this feature</p>

      <div class="msg-banner" id="msgBox"></div>

      <form id="authForm" autocomplete="on">
        <!-- Name (register only) -->
        <div class="field" id="nameFieldWrap" style="display:none">
          <label>Full Name</label>
          <div class="input-row">
            <i class="bi bi-person"></i>
            <input type="text" id="nameInput" placeholder="Your full name" autocomplete="name">
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label>Email</label>
          <div class="input-row">
            <i class="bi bi-envelope"></i>
            <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label>Password</label>
          <div class="input-row">
            <i class="bi bi-lock"></i>
            <input type="password" id="passInput" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
              <i class="bi bi-eye-slash" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <a class="forgot" id="forgotLink">Forgot password?</a>

        <button type="submit" class="btn-primary" id="submitBtn">
          <div class="spinner" id="spinner"></div>
          <span id="btnLabel">Continue</span>
          <i class="bi bi-arrow-right"></i>
        </button>
      </form>

      <div class="divider"><span>or</span></div>
      <p class="switch-text" id="switchText">
        Don't have an account? <a id="switchBtn">Register</a>
      </p>
    </div>

    <!-- ── Forgot password view ── -->
    <div class="reset-section" id="resetSection">
      <span class="back-link" id="backToLogin">
        <i class="bi bi-arrow-left"></i> Back to Sign In
      </span>
      <h2 class="form-title">Reset Password</h2>
      <p class="form-sub">Enter your email and we'll send a reset link.</p>

      <div class="msg-banner" id="resetMsg"></div>

      <div class="field">
        <label>Email</label>
        <div class="input-row">
          <i class="bi bi-envelope"></i>
          <input type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <button class="btn-primary" id="resetBtn">
        <div class="spinner" id="resetSpinner"></div>
        <span>Send Reset Email</span>
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>

  <!-- Dark mode toggle -->
  <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">
    <i id="darkIcon" class="bi bi-moon-fill"></i>
  </button>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
    /* ── Firebase ── */
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            "AIzaSyDYwO0SAoHcg076PnCGMGaAmvHfwPl6-n4",
        authDomain:        "project-management-man2.firebaseapp.com",
        databaseURL:       "https://project-management-man2-default-rtdb.firebaseio.com",
        projectId:         "project-management-man2",
        storageBucket:     "project-management-man2.appspot.com",
        messagingSenderId: "731310432635",
        appId:             "1:731310432635:web:d617c81ee9cd0122a49dde"
      });
    }
    const auth = firebase.auth();

    /* ── URL params ── */
    const params   = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || 'index_kmc.html';
    const feature  = params.get('feature')  || 'Feature';
    document.getElementById('featureLabel').textContent = feature;
    document.title = 'Sign In | ' + feature;

    /* ── Auto-redirect if already logged in ── */
    auth.onAuthStateChanged(user => {
      if (user) location.href = redirect;
    });

    /* ── Dark mode ── */
    function applyDark(on) {
      document.documentElement.setAttribute('data-dark', on ? '1' : '0');
      document.getElementById('darkIcon').className = on ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      localStorage.setItem('cymDark', on ? '1' : '0');
    }
    function toggleDark() { applyDark(localStorage.getItem('cymDark') !== '1'); }
    applyDark(localStorage.getItem('cymDark') === '1');

    /* ── Mode switch (login ↔ register) ── */
    let isLogin = true;
    function rebindSwitch() {
      document.getElementById('switchBtn').onclick = () => {
        isLogin = !isLogin;
        const nw = document.getElementById('nameFieldWrap');
        const fl = document.getElementById('forgotLink');
        document.getElementById('formTitle').textContent    = isLogin ? 'Welcome back'              : 'Create account';
        document.getElementById('formSub').textContent      = isLogin ? 'Sign in to access this feature' : 'Start using this feature today';
        document.getElementById('btnLabel').textContent     = isLogin ? 'Continue'                  : 'Create Account';
        nw.style.display = isLogin ? 'none' : 'block';
        fl.style.display = isLogin ? 'block' : 'none';
        document.getElementById('switchText').innerHTML = isLogin
          ? "Don't have an account? <a id='switchBtn'>Register</a>"
          : "Already have an account? <a id='switchBtn'>Sign In</a>";
        rebindSwitch();
        clearMsg();
      };
    }
    rebindSwitch();

    /* ── Message helpers ── */
    function showMsg(el, text, type) { el.textContent = text; el.className = 'msg-banner ' + type; }
    function clearMsg() { document.getElementById('msgBox').className = 'msg-banner'; }

    const FRIENDLY = {
      'auth/user-not-found':       'No account found with this email.',
      'auth/wrong-password':       'Incorrect password. Try again or reset it.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/email-already-in-use': 'An account already exists with this email.',
      'auth/weak-password':        'Password must be at least 6 characters.',
      'auth/too-many-requests':    'Too many attempts. Please wait a moment.',
      'auth/invalid-credential':   'Incorrect email or password.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };

    /* ── Auth form ── */
    document.getElementById('authForm').onsubmit = async (e) => {
      e.preventDefault();
      const msg      = document.getElementById('msgBox');
      const btn      = document.getElementById('submitBtn');
      const spinner  = document.getElementById('spinner');
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passInput').value;

      btn.disabled = true; spinner.style.display = 'block'; clearMsg();

      try {
        if (isLogin) {
          await auth.signInWithEmailAndPassword(email, password);
        } else {
          await auth.createUserWithEmailAndPassword(email, password);
          // Update display name if provided
          const name = document.getElementById('nameInput').value.trim();
          if (name && auth.currentUser) await auth.currentUser.updateProfile({ displayName: name });
        }
        showMsg(msg, '✅ ' + (isLogin ? 'Signed in! Redirecting…' : 'Account created! Redirecting…'), 'success');
        setTimeout(() => location.href = redirect, 900);
      } catch (err) {
        showMsg(msg, '⚠️ ' + (FRIENDLY[err.code] || err.message), 'error');
        btn.disabled = false; spinner.style.display = 'none';
      }
    };

    /* ── Enter key ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none')
        document.getElementById('authForm').requestSubmit();
    });

    /* ── Eye toggle ── */
    document.getElementById('eyeBtn').onclick = () => {
      const p = document.getElementById('passInput');
      const i = document.getElementById('eyeIcon');
      p.type  = p.type === 'password' ? 'text' : 'password';
      i.className = p.type === 'password' ? 'bi bi-eye-slash' : 'bi bi-eye';
    };

    /* ── Forgot password flow ── */
    document.getElementById('forgotLink').onclick = () => {
      const email = document.getElementById('emailInput').value;
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('resetSection').style.display = 'block';
      if (email) document.getElementById('resetEmail').value = email;
    };
    document.getElementById('backToLogin').onclick = () => {
      document.getElementById('resetSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    };
    document.getElementById('resetBtn').onclick = async () => {
      const msg     = document.getElementById('resetMsg');
      const email   = document.getElementById('resetEmail').value.trim();
      const btn     = document.getElementById('resetBtn');
      const spinner = document.getElementById('resetSpinner');
      if (!email) { showMsg(msg, '⚠️ Please enter your email.', 'error'); return; }
      btn.disabled = true; spinner.style.display = 'block';
      try {
        await auth.sendPasswordResetEmail(email);
        showMsg(msg, '📩 Reset email sent! Check your inbox.', 'success');
      } catch (err) {
        showMsg(msg, '⚠️ ' + (FRIENDLY[err.code] || err.message), 'error');
      } finally {
        btn.disabled = false; spinner.style.display = 'none';
      }
    };
  </script>
</body>
</html>
