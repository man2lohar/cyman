<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Extraction | Multiple Tables</title>
    <link rel="icon" href="..\..\assets\images\logo.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="..\..\..\src\styles\data_extraction_kmc\style_kmc.css">
    <link rel="stylesheet" href="..\..\..\src/styles/bubble.css">
    <link rel="stylesheet" href="../../../src/styles/pop-up.css">
</head>
<body>
    <div class="particles"></div>
    <div class="main-container">
        <div class="header-section">
            <div class="logo-container">
                <a href="index_kmc.html" style="display: flex; align-items: center; text-decoration: none;">
                    <img src="../../assets/images/logo.png" alt="Homepage Logo" style="width:40px; height:auto; margin-right: 10px;">
                    <h2>CyManSquare</h2>
                </a>
            </div>
            <h1>Every Layer Tables</h1>
            <button id="back-button" class="back-button">Back</button>
        </div>
        <div class="container">
            <div id="tables-container">
                <!-- Tables will be dynamically inserted here -->
            </div>
        </div>
    </div>
    <script>

        document.getElementById('back-button').addEventListener('click', function() {
            window.location.href = 'index_kmc.html';
        });

        function generateTables() {
            const csv = localStorage.getItem('csvData');
            
            // Check if there's no CSV data in localStorage
            if (!csv) {
                showCustomAlert('No CSV data found.');
                return; // Stop further execution if no data is found
            }

            const rows = csv.split('\n');
            const categories = {}; // Object to store rows by category

            // Assuming the first row contains headers
            const headers = rows[0].split(',');

            // Set category index to 3 (fourth column)
            const categoryIndex = 3;

            rows.slice(1).forEach(row => {
                const cells = row.split(',');
                if (cells.length > 0) {
                    const category = cells[categoryIndex];
                    if (!categories[category]) {
                        categories[category] = [];
                    }
                    categories[category].push(cells);
                }
            });

            const container = document.getElementById('tables-container');

            Object.keys(categories).forEach(category => {
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                const tbody = document.createElement('tbody');

                const headerRow = document.createElement('tr');
                headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                categories[category].forEach(cells => {
                    const row = document.createElement('tr');
                    cells.forEach((cell, index) => {
                        const td = document.createElement('td');
                        td.textContent = cell;
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
                table.appendChild(thead);
                table.appendChild(tbody);
                const title = document.createElement('h2');
                title.textContent = `${category}`;
                container.appendChild(title);
                container.appendChild(table);
            });
        }

        generateTables();

    </script>
    <script src="..\..\..\src\js\index.js"></script>
    <script src="..\..\..\src\library\xlsx.full.min.js"></script>
    <script src="..\..\..\src\js\block.js"></script>
</body>
</html>
