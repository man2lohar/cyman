<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | CyMan² Project Manager</title>
  <link rel="icon" href="..\..\assets\images\logo.ico" type="image/x-icon">

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #0b74ff;
      --bg: #f6f9ff;
      --card: #ffffff;
      --muted: #6b7280;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "Inter", "Poppins", system-ui, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo h2 {
      color: var(--accent);
      font-family: "Akaya Kanadaka", cursive;
      font-size: 28px;
      margin-left: 10px;
      margin-bottom: 0;
    }

    h3 {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 10px !important;
      border: 1px solid rgba(11, 116, 255, 0.15);
      padding-right: 40px;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: none;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper i {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: 4px;
      margin-bottom: 14px;
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    .btn-accent:hover {
      background: #005ae0;
    }

    .btn-outline {
      border-radius: 10px;
      font-weight: 600;
    }

    #msg {
      margin-top: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
    }

    #msg.error {
      background: rgba(255, 75, 75, 0.08);
      color: #d93025;
      border: 1px solid rgba(217, 48, 37, 0.15);
      display: block;
    }

    #msg.success {
      background: rgba(11, 116, 255, 0.08);
      color: var(--accent);
      border: 1px solid rgba(11, 116, 255, 0.15);
      display: block;
    }

    .footer-text {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="logo">
      <img src="../../assets/images/logo.png" alt="Logo" style="width:38px; height:auto;">
      <h2>CyMan²</h2>
    </div>

    <h3>Welcome Back</h3>

    <input id="email" type="email" class="form-control mb-2" placeholder="Email" />

    <div class="password-wrapper mb-1">
      <input id="password" type="password" class="form-control" placeholder="Password" />
      <i class="bi bi-eye-slash" id="toggleIcon"></i>
    </div>

    <a href="#" id="forgotPassword" class="forgot">Forgot Password?</a>

    <button id="loginBtn" class="btn btn-accent w-100 mb-2">Login</button>
    <button id="signupBtn" class="btn btn-outline-secondary w-100">Sign Up</button>

    <div id="msg"></div>
    <div class="footer-text">CyMan² Project Management</div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDYwO0SAoHcg076PnCGMGaAmvHfwPl6-n4",
      authDomain: "project-management-man2.firebaseapp.com",
      databaseURL: "https://project-management-man2-default-rtdb.firebaseio.com",
      projectId: "project-management-man2",
      storageBucket: "project-management-man2.firebasestorage.app",
      messagingSenderId: "731310432635",
      appId: "1:731310432635:web:d617c81ee9cd0122a49dde",
      measurementId: "G-NJFELXSRRP"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const msg = document.getElementById("msg");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = type;
      msg.style.display = "block";
    }

    // ✅ Login function
    function handleLogin() {
      if (!email.value || !password.value)
        return showMessage("⚠️ Please fill in both fields!", "error");

      auth.signInWithEmailAndPassword(email.value, password.value)
        .then(() => {
          showMessage("✅ Login successful! Redirecting...", "success");
          setTimeout(() => window.location = "index.html", 1000);
        })
        .catch(e => showMessage("⚠️ " + e.message, "error"));
    }

    // ✅ Signup function with better blank error
    function handleSignup() {
      if (!email.value || !password.value)
        return showMessage("⚠️ Email and Password cannot be blank.", "error");

      auth.createUserWithEmailAndPassword(email.value, password.value)
        .then(() => showMessage("✅ Account created successfully!", "success"))
        .catch(e => {
          if (e.code === "auth/invalid-email")
            showMessage("⚠️ Invalid email format.", "error");
          else if (e.code === "auth/weak-password")
            showMessage("⚠️ Password should be at least 6 characters.", "error");
          else
            showMessage("⚠️ " + e.message, "error");
        });
    }

    // ✅ Forgot password
    document.getElementById("forgotPassword").onclick = (e) => {
      e.preventDefault();
      if (!email.value) return showMessage("⚠️ Please enter your email first!", "error");
      auth.sendPasswordResetEmail(email.value)
        .then(() => showMessage("📩 Password reset email sent!", "success"))
        .catch(e => showMessage("⚠️ " + e.message, "error"));
    };

    // 👁️ Toggle password visibility
    document.getElementById("toggleIcon").onclick = () => {
      const input = document.getElementById("password");
      const icon = document.getElementById("toggleIcon");
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
      }
    };

    // ⏎ Press Enter to login
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });

    // Button actions
    document.getElementById("loginBtn").onclick = handleLogin;
    document.getElementById("signupBtn").onclick = handleSignup;
  </script>
</body>
</html>
