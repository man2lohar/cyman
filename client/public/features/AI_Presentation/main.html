<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mini PowerPoint-like Editor</title>
<style>
  body, html {
    margin:0; padding:0; height:100vh; display:flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f0f0;
    user-select: none;
  }
  #sidebar {
    width: 140px;
    background: #222;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 10px;
    overflow-y: auto;
  }
  #sidebar header {
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 10px;
    text-align: center;
  }
  #slidesList {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .slide-thumb {
    background: #333;
    border-radius: 6px;
    cursor: pointer;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-weight: 600;
    user-select: none;
    border: 3px solid transparent;
    position: relative;
  }
  .slide-thumb.selected {
    border-color: #3a86ff;
    color: white;
    background: #0d47a1;
  }
  .slide-thumb span {
    pointer-events: none;
  }
  #addSlideBtn {
    background: #3a86ff;
    border: none;
    padding: 8px;
    border-radius: 6px;
    color: white;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s ease;
  }
  #addSlideBtn:hover {
    background: #265ecf;
  }

  #main {
    flex-grow: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  #toolbar {
    height: 50px;
    background: white;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    user-select: none;
  }
  #toolbar button {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #444;
    padding: 6px 8px;
    border-radius: 4px;
    transition: background-color 0.2s ease;
  }
  #toolbar button:hover {
    background: #dbe9ff;
    color: #3a86ff;
  }
  #toolbar button.active {
    background: #3a86ff;
    color: white;
  }
  #toolbar select, #toolbar input[type=color], #toolbar input[type=number] {
    padding: 4px 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 14px;
    cursor: pointer;
  }
  #canvas {
    flex-grow: 1;
    margin-top: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
    width: 100%;
    max-width: 960px;
    height: 540px;
    margin-left: auto;
    margin-right: auto;
  }
  .element {
    position: absolute;
    border: 2px dashed transparent;
    cursor: move;
    background: transparent;
    box-sizing: border-box;
    user-select: none;
  }
  .element.selected {
    border-color: #3a86ff;
    background-color: rgba(58,134,255,0.15);
  }
  .element[contenteditable="true"] {
    outline: none;
    cursor: text;
    padding: 4px;
    min-width: 40px;
    min-height: 30px;
  }
  .element img {
    max-width: 100%;
    max-height: 100%;
    display: block;
    pointer-events: none;
  }
  /* Resize handles */
  .resize-handle {
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border: 2px solid #3a86ff;
    border-radius: 50%;
    cursor: nwse-resize;
    right: -8px;
    bottom: -8px;
    display: none;
  }
  .element.selected .resize-handle {
    display: block;
  }
</style>
</head>
<body>

<div id="sidebar" aria-label="Slides Sidebar">
  <header>Slides</header>
  <div id="slidesList"></div>
  <button id="addSlideBtn" aria-label="Add Slide">+ Add Slide</button>
</div>

<div id="main">
  <div id="toolbar" aria-label="Text formatting toolbar">
    <button id="boldBtn" title="Bold (Ctrl+B)"><b>B</b></button>
    <button id="italicBtn" title="Italic (Ctrl+I)"><i>I</i></button>
    <button id="underlineBtn" title="Underline (Ctrl+U)"><u>U</u></button>
    <select id="fontFamilySelect" title="Font Family">
      <option value="Segoe UI, Tahoma, Geneva, Verdana, sans-serif">Segoe UI</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="Courier New, monospace">Courier New</option>
      <option value="Times New Roman, serif">Times New Roman</option>
      <option value="Roboto, sans-serif">Roboto</option>
    </select>
    <input type="number" id="fontSizeInput" min="10" max="72" value="18" title="Font Size (px)" />
    <input type="color" id="fontColorInput" title="Font Color" value="#000000" />
    <button id="addTextBtn" title="Add Text">📝</button>
    <button id="addImageBtn" title="Add Image">🖼️</button>
    <button id="deleteElementBtn" title="Delete Selected Element">🗑️</button>
  </div>

  <div id="canvas" tabindex="0" aria-label="Slide editing canvas"></div>
</div>

<script>
  // Data Model
  let slides = [];
  let currentSlideIndex = -1;
  let selectedElement = null;

  // DOM Elements
  const slidesList = document.getElementById('slidesList');
  const addSlideBtn = document.getElementById('addSlideBtn');
  const canvas = document.getElementById('canvas');
  const toolbar = {
    boldBtn: document.getElementById('boldBtn'),
    italicBtn: document.getElementById('italicBtn'),
    underlineBtn: document.getElementById('underlineBtn'),
    fontFamilySelect: document.getElementById('fontFamilySelect'),
    fontSizeInput: document.getElementById('fontSizeInput'),
    fontColorInput: document.getElementById('fontColorInput'),
    addTextBtn: document.getElementById('addTextBtn'),
    addImageBtn: document.getElementById('addImageBtn'),
    deleteElementBtn: document.getElementById('deleteElementBtn'),
  };

  // Initialize
  function init() {
    addSlide();
    renderSlidesList();
    updateToolbarState();
  }

  // Create a new empty slide
  function createSlide() {
    return {
      elements: []
    };
  }

  // Add slide
  function addSlide() {
    slides.push(createSlide());
    currentSlideIndex = slides.length - 1;
    renderSlidesList();
    renderSlide();
  }

  // Delete slide
  function deleteSlide(index) {
    if (slides.length <= 1) {
      alert('Cannot delete the last slide.');
      return;
    }
    slides.splice(index, 1);
    if (currentSlideIndex >= slides.length) currentSlideIndex = slides.length - 1;
    selectedElement = null;
    renderSlidesList();
    renderSlide();
    updateToolbarState();
  }

  // Render slides thumbnails in sidebar
  function renderSlidesList() {
    slidesList.innerHTML = '';
    slides.forEach((slide, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'slide-thumb' + (i === currentSlideIndex ? ' selected' : '');
      thumb.textContent = `Slide ${i + 1}`;
      thumb.addEventListener('click', () => {
        currentSlideIndex = i;
        selectedElement = null;
        renderSlidesList();
        renderSlide();
        updateToolbarState();
      });

      // Right click to delete slide
      thumb.addEventListener('contextmenu', e => {
        e.preventDefault();
        if (confirm(`Delete Slide ${i + 1}?`)) {
          deleteSlide(i);
        }
      });

      slidesList.appendChild(thumb);
    });
  }

  // Render current slide content in canvas
  function renderSlide() {
    canvas.innerHTML = '';
    const slide = slides[currentSlideIndex];
    slide.elements.forEach((el, idx) => {
      const div = document.createElement('div');
      div.className = 'element';
      div.style.left = el.left + 'px';
      div.style.top = el.top + 'px';
      div.style.width = el.width + 'px';
      div.style.height = el.height + 'px';
      div.dataset.idx = idx;

      if (el.type === 'text') {
        div.contentEditable = true;
        div.style.fontFamily = el.style.fontFamily;
        div.style.fontSize = el.style.fontSize + 'px';
        div.style.color = el.style.color;
        div.style.textDecoration = el.style.underline ? 'underline' : 'none';
        div.style.fontWeight = el.style.bold ? 'bold' : 'normal';
        div.style.fontStyle = el.style.italic ? 'italic' : 'normal';
        div.innerHTML = el.content;
      } else if (el.type === 'image') {
        div.contentEditable = false;
        const img = document.createElement('img');
        img.src = el.content;
        img.style.width = '100%';
        img.style.height = '100%';
        img.draggable = false;
        div.appendChild(img);
      }

      // Resize handle
      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'resize-handle';
      div.appendChild(resizeHandle);

      // Click to select
      div.addEventListener('mousedown', e => {
        e.stopPropagation();
        selectElement(div);
      });

      // Dragging
      makeDraggable(div);

      // Resizing
      makeResizable(div, resizeHandle);

      // Detect content changes for text
      if (el.type === 'text') {
        div.addEventListener('input', e => {
          slide.elements[idx].content = div.innerHTML;
        });
      }

      canvas.appendChild(div);
    });
  }

  // Select element
  function selectElement(el) {
    if (selectedElement) selectedElement.classList.remove('selected');
    selectedElement = el;
    el.classList.add('selected');
    updateToolbarState();
  }

  // Deselect element
  function deselectElement() {
    if (selectedElement) selectedElement.classList.remove('selected');
    selectedElement = null;
    updateToolbarState();
  }

  // Update toolbar buttons based on selected element styles
  function updateToolbarState() {
    if (!selectedElement) {
      // Disable toolbar buttons except add buttons
      toolbar.boldBtn.classList.remove('active');
      toolbar.italicBtn.classList.remove('active');
      toolbar.underlineBtn.classList.remove('active');
      toolbar.fontFamilySelect.disabled = true;
      toolbar.fontSizeInput.disabled = true;
      toolbar.fontColorInput.disabled = true;
      toolbar.deleteElementBtn.disabled = true;
      return;
    }

    // Enable toolbar buttons
    toolbar.fontFamilySelect.disabled = false;
    toolbar.fontSizeInput.disabled = false;
    toolbar.fontColorInput.disabled = false;
    toolbar.deleteElementBtn.disabled = false;

    const idx = selectedElement.dataset.idx;
    const elData = slides[currentSlideIndex].elements[idx];
    if (elData.type !== 'text') {
      // For images, disable text formatting buttons
      toolbar.boldBtn.classList.remove('active');
      toolbar.italicBtn.classList.remove('active');
      toolbar.underlineBtn.classList.remove('active');
      toolbar.fontFamilySelect.disabled = true;
      toolbar.fontSizeInput.disabled = true;
      toolbar.fontColorInput.disabled = true;
      return;
    }

    toolbar.boldBtn.classList.toggle('active', elData.style.bold);
    toolbar.italicBtn.classList.toggle('active', elData.style.italic);
    toolbar.underlineBtn.classList.toggle('active', elData.style.underline);
    toolbar.fontFamilySelect.value = elData.style.fontFamily;
    toolbar.fontSizeInput.value = elData.style.fontSize;
    toolbar.fontColorInput.value = elData.style.color;
  }

  // Make element draggable within canvas bounds
  function makeDraggable(el) {
    let isDragging = false, startX, startY, origX, origY;
    el.addEventListener('mousedown', e => {
      if (e.target.classList.contains('resize-handle')) return;
      if (selectedElement !== el) selectElement(el);
      if (e.target.isContentEditable || e.target.tagName.toLowerCase() === 'img') return; // Don't drag if typing or on image
      e.preventDefault();
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      origX = el.offsetLeft;
      origY = el.offsetTop;
      document.body.style.userSelect = 'none';
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      let dx = e.clientX - startX;
      let dy = e.clientY - startY;
      let newX = origX + dx;
      let newY = origY + dy;
      // Clamp inside canvas
      newX = Math.min(Math.max(0, newX), canvas.clientWidth - el.offsetWidth);
      newY = Math.min(Math.max(0, newY), canvas.clientHeight - el.offsetHeight);
      el.style.left = newX + 'px';
      el.style.top = newY + 'px';

      // Update data model
      const idx = el.dataset.idx;
      slides[currentSlideIndex].elements[idx].left = newX;
      slides[currentSlideIndex].elements[idx].top = newY;
    });
    window.addEventListener('mouseup', e => {
      if (isDragging) {
        isDragging = false;
        document.body.style.userSelect = 'auto';
      }
    });
  }

  // Make element resizable from bottom-right handle
  function makeResizable(el, handle) {
    let isResizing = false, startX, startY, startWidth, startHeight;
    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      e.preventDefault();
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = el.offsetWidth;
      startHeight = el.offsetHeight;
      document.body.style.userSelect = 'none';
    });
    window.addEventListener('mousemove', e => {
      if (!isResizing) return;
      let dx = e.clientX - startX;
      let dy = e.clientY - startY;
      let newWidth = Math.max(40, startWidth + dx);
      let newHeight = Math.max(30, startHeight + dy);
      // Clamp inside canvas
      newWidth = Math.min(newWidth, canvas.clientWidth - el.offsetLeft);
      newHeight = Math.min(newHeight, canvas.clientHeight - el.offsetTop);
      el.style.width = newWidth + 'px';
      el.style.height = newHeight + 'px';

      // Update data model
      const idx = el.dataset.idx;
      slides[currentSlideIndex].elements[idx].width = newWidth;
      slides[currentSlideIndex].elements[idx].height = newHeight;
    });
    window.addEventListener('mouseup', e => {
      if (isResizing) {
        isResizing = false;
        document.body.style.userSelect = 'auto';
      }
    });
  }

  // Toolbar handlers
  toolbar.boldBtn.addEventListener('click', () => {
    toggleStyle('bold');
  });
  toolbar.italicBtn.addEventListener('click', () => {
    toggleStyle('italic');
  });
  toolbar.underlineBtn.addEventListener('click', () => {
    toggleStyle('underline');
  });

  function toggleStyle(style) {
    if (!selectedElement) return;
    const idx = selectedElement.dataset.idx;
    const elData = slides[currentSlideIndex].elements[idx];
    if (elData.type !== 'text') return;
    elData.style[style] = !elData.style[style];
    renderSlide();
    selectElement(document.querySelector(`.element[data-idx="${idx}"]`));
  }

  toolbar.fontFamilySelect.addEventListener('change', e => {
    applyStyle('fontFamily', e.target.value);
  });
  toolbar.fontSizeInput.addEventListener('change', e => {
    let size = parseInt(e.target.value);
    if (isNaN(size) || size < 10) size = 10;
    if (size > 72) size = 72;
    e.target.value = size;
    applyStyle('fontSize', size);
  });
  toolbar.fontColorInput.addEventListener('change', e => {
    applyStyle('color', e.target.value);
  });

  function applyStyle(key, value) {
    if (!selectedElement) return;
    const idx = selectedElement.dataset.idx;
    const elData = slides[currentSlideIndex].elements[idx];
    if (elData.type !== 'text') return;
    elData.style[key] = value;
    renderSlide();
    selectElement(document.querySelector(`.element[data-idx="${idx}"]`));
  }

  // Add new text element
  toolbar.addTextBtn.addEventListener('click', () => {
    const slide = slides[currentSlideIndex];
    slide.elements.push({
      type: 'text',
      content: 'New Text',
      left: 50,
      top: 50,
      width: 160,
      height: 50,
      style: {
        bold: false,
        italic: false,
        underline: false,
        fontFamily: 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif',
        fontSize: 18,
        color: '#000000',
      }
    });
    renderSlide();
    selectElement(document.querySelector(`.element[data-idx="${slide.elements.length - 1}"]`));
  });

  // Add image element - open file picker
  toolbar.addImageBtn.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const slide = slides[currentSlideIndex];
        slide.elements.push({
          type: 'image',
          content: ev.target.result,
          left: 50,
          top: 50,
          width: 200,
          height: 150,
          style: {}
        });
        renderSlide();
        selectElement(document.querySelector(`.element[data-idx="${slide.elements.length - 1}"]`));
      }
      reader.readAsDataURL(file);
    }
    input.click();
  });

  // Delete selected element
  toolbar.deleteElementBtn.addEventListener('click', () => {
    if (!selectedElement) return;
    const idx = parseInt(selectedElement.dataset.idx);
    slides[currentSlideIndex].elements.splice(idx, 1);
    selectedElement = null;
    renderSlide();
    updateToolbarState();
  });

  // Deselect element when clicking outside
  canvas.addEventListener('mousedown', e => {
    if (e.target === canvas) {
      deselectElement();
    }
  });

  // Keyboard shortcuts for bold, italic, underline
  document.addEventListener('keydown', e => {
    if (!selectedElement) return;
    if (e.ctrlKey || e.metaKey) {
      if (e.key.toLowerCase() === 'b') {
        e.preventDefault();
        toggleStyle('bold');
      }
      if (e.key.toLowerCase() === 'i') {
        e.preventDefault();
        toggleStyle('italic');
      }
      if (e.key.toLowerCase() === 'u') {
        e.preventDefault();
        toggleStyle('underline');
      }
    }
  });

  // Initialize on load
  init();
</script>

</body>
</html>
