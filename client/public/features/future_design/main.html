<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <title>CyMan² AI Architecture Menu - Bigger & Faster Popup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e8f0f8 0%, #c3d6e8 100%);
      font-family: 'Poppins', sans-serif;
      color: #334e68;
      overflow: hidden;
      user-select: none;
    }
    h1.brand {
      position: absolute;
      top: 30px;
      font-size: 2.5rem;
      color: #406882;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-style: italic;
      user-select: none;
      text-shadow: 1px 1px 2px #b0c4de88;
    }
    .menu-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      perspective: 900px;
    }

    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ffffffee;
      border: 2px solid #7fa8c9;
      border-radius: 50%;
      width: 110px;
      height: 110px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #406882;
      cursor: pointer;
      box-shadow:
        0 4px 12px rgba(100, 120, 160, 0.3),
        inset 0 0 6px #a0b7d9aa;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      user-select: none;
      text-align: center;
      line-height: 1.2;
      padding: 0 8px;
    }
    .center-btn:hover {
      background: #f0f6ffee;
      box-shadow:
        0 6px 16px rgba(80, 100, 140, 0.45),
        inset 0 0 10px #a0b7d9cc;
    }

    .option {
      position: absolute;
      width: 100px;
      height: 100px;
      background: #f9fbffcc;
      border: 1.8px solid #a7b8d6;
      border-radius: 50%;
      color: #406882;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      box-shadow:
        0 3px 8px rgba(130, 160, 210, 0.3),
        inset 0 0 5px #cad9f1cc;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.75);
      transition:
        opacity 0.3s ease,
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 0 4px #adc2e2aa);
      border-radius: 50%;
      padding: 8px 6px;
    }
    .option svg {
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      fill: #406882;
      filter: drop-shadow(0 0 1.5px #abc2e2cc);
      flex-shrink: 0;
    }

    /* Positions for 6 options evenly spaced around circle */
    .menu-wrapper:hover .option {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    /* Calculate positions using degrees */
    .option:nth-child(2) { /* 0 deg (top) */
      top: 10%;
      left: 50%;
      transition-delay: 0.03s;
    }
    .option:nth-child(3) { /* 60 deg */
      top: 28%;
      left: 83%;
      transition-delay: 0.06s;
    }
    .option:nth-child(4) { /* 120 deg */
      top: 72%;
      left: 83%;
      transition-delay: 0.09s;
    }
    .option:nth-child(5) { /* 180 deg (bottom) */
      top: 90%;
      left: 50%;
      transition-delay: 0.12s;
    }
    .option:nth-child(6) { /* 240 deg */
      top: 72%;
      left: 17%;
      transition-delay: 0.15s;
    }
    .option:nth-child(7) { /* 300 deg */
      top: 28%;
      left: 17%;
      transition-delay: 0.18s;
    }

    /* Hover effect on each option */
    .option:hover {
      background: #dce6f7;
      color: #25406a;
      box-shadow:
        0 10px 22px rgba(100, 130, 180, 0.5),
        inset 0 0 12px #a0b7d9cc;
      transform: translate(-50%, -50%) scale(1.2);
      z-index: 20;
    }

  </style>
</head>
<body>
  <h1 class="brand">CyMan² AI Architecture</h1>

  <div class="menu-wrapper" aria-label="AI Architecture Main Menu">

    <div class="center-btn" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" aria-controls="menu-options">
      🏛️ AI Design
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Generate Plan">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h2v-2H3v2zm3 0h2v-2H6v2zm4 0h2v-2h-2v2zm4 0h2v-2h-2v2zm3-6H4c-1.1 0-2 .9-2 2v6h18v-6c0-1.1-.9-2-2-2zM4 17v2c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-2H4z"/></svg>
      Generate Plan
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Optimize Layout">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7V3l9 4-9 4V9zM2 10l7 4v4l-7-4v-4z"/></svg>
      Optimize Layout
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Place Openings">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 20h10v-2H7v2zm2-4h6v-2H9v2zM5 8v4h14V8H5zm2-6h10v2H7V2z"/></svg>
      Place Openings
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Area Summary">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h2v-2H3v2zm3 0h2v-2H6v2zm4 0h2v-2h-2v2zm4 0h2v-2h-2v2zm3-6H4c-1.1 0-2 .9-2 2v6h18v-6c0-1.1-.9-2-2-2zM4 17v2c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-2H4z"/></svg>
      Area Summary
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Vastu Adjust">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L2 7v6c0 5 4 9 9 9s9-4 9-9V7l-10-5z"/></svg>
      Vastu Adjust
    </div>

    <div class="option" tabindex="0" role="menuitem" aria-label="Auto Room Set">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 14h10v-2H7v2zm-2 4h14v-2H5v2zm-2-8h18v-2H3v2z"/></svg>
      Auto Room Set
    </div>
  </div>
</body>
</html>
