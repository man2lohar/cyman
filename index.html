<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <link rel="icon" href="client/public/assets/images/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="client/src/styles/bubble.css">
    <link rel="stylesheet" href="client/public/assets/fonts/Akaya Kanadaka.ttf">
    <link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&display=swap" rel="stylesheet">


    <!-- Redirect after 2 seconds to client/public/index.html -->
    <meta http-equiv="refresh" content="2;url=client/src/pages/index.html">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #0d1117;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        .loading-text {
            font-family: Akaya Kanadaka, sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: fadeInOut 1.5s infinite;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid transparent;
            border-top: 5px solid #4caf50;
            border-right: 5px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="loading-text">Loading... Please Wait</div>
    <div class="spinner"></div>
    <script src="client/src/js/index.js"></script>
</body>
</html>
